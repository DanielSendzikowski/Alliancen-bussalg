<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC Horsens Udebanesalg</title>
    
    <!-- Indlæser React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Indlæser Babel (så browseren forstår React-koden) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Indlæser Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Indlæser Lucide ikoner (som SVG'er direkte via et lille script) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Vores Ikon-komponent (fordi vi ikke bruger lucide-react pakken direkte i HTML)
        const Icon = ({ name, className, size = 24 }) => {
            const iconRef = React.useRef(null);
            
            useEffect(() => {
                if (iconRef.current) {
                    // Tøm tidligere ikon, hvis navnet ændres
                    iconRef.current.innerHTML = '';
                    
                    // Lucide har en funktion til at oprette ikoner direkte
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.setAttribute('width', size);
                    iconElement.setAttribute('height', size);
                    
                    if (className) {
                        iconElement.className = className;
                    }
                    
                    iconRef.current.appendChild(iconElement);
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const INITIAL_PRODUCTS = [
            { id: '1', name: 'Øl', price: 20, icon: 'beer' },
            { id: '2', name: 'Kasse øl', price: 400, icon: 'beer' },
            { id: '3', name: 'Shaker', price: 20, icon: 'cup-soda' },
            { id: '4', name: 'Kasse Shaker', price: 400, icon: 'cup-soda' },
            { id: '5', name: 'Sodavand', price: 20, icon: 'cup-soda' },
            { id: '6', name: 'Vand', price: 20, icon: 'glass-water' },
            { id: '7', name: 'Chips', price: 20, icon: 'shopping-bag' },
        ];

        function App() {
            const [sales, setSales] = useState([]);
            const [total, setTotal] = useState(0);
            const [isSending, setIsSending] = useState(false);

            const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxiwkdEnPtIiVRhQ-u_nXuXwQ6Zyi7JclYFhtW5TIIXxgASDAKjomFQVcat6paqgfZJOA/exec';

            useEffect(() => {
                const newTotal = sales.reduce((sum, item) => sum + item.price, 0);
                setTotal(newTotal);
            }, [sales]);

            const handleSale = (product) => {
                const newSale = {
                    id: Date.now().toString(),
                    product: product.name,
                    price: product.price,
                    timestamp: new Date().toISOString(),
                };
                setSales([newSale, ...sales]);
            };

            const undoLastSale = () => {
                if (sales.length === 0) return;
                const newSales = [...sales];
                newSales.shift();
                setSales(newSales);
            };

            const clearAllSales = () => {
                if (window.confirm('Er du sikker på, at du vil slette hele loggen? Dette kan ikke fortrydes.')) {
                    setSales([]);
                }
            };

            const sendToGoogleSheet = async () => {
                if (sales.length === 0) {
                    alert("Der er ingen salg at sende endnu.");
                    return;
                }

                setIsSending(true);
                try {
                    const orderTime = new Date();
                    const pad = (n) => n.toString().padStart(2, '0');
                    const formattedDate = `${pad(orderTime.getDate())}/${pad(orderTime.getMonth() + 1)}/${orderTime.getFullYear()}`;
                    const formattedTime = orderTime.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                    const dataToSend = sales.map(s => {
                        return {
                            date: formattedDate,
                            time: formattedTime,
                            product: s.product,
                            price: s.price
                        };
                    });

                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(dataToSend),
                    });

                    setSales([]);
                } catch (error) {
                    console.error("Fejl:", error);
                    alert("Der opstod en fejl. Tjek din internetforbindelse.");
                } finally {
                    setIsSending(false);
                }
            };

            const getIconColor = (iconName) => {
                if (iconName === 'glass-water') return "text-blue-600 mb-2";
                return "text-yellow-900 mb-2";
            };

            return (
                <div className="min-h-screen flex flex-col font-sans pb-safe">
                    <header className="bg-yellow-400 text-gray-900 p-4 shadow-md sticky top-0 z-10">
                        <h1 className="text-xl font-bold text-center uppercase tracking-wider">Udebanesalg</h1>
                        <div className="flex justify-between items-center mt-3 bg-gray-900 text-yellow-400 rounded-lg p-3">
                            <span className="text-sm font-medium uppercase">Samlet pris</span>
                            <span className="text-2xl font-bold">{total} kr.</span>
                        </div>
                    </header>

                    <main className="flex-grow p-4 flex flex-col gap-6">
                        <section>
                            <h2 className="text-sm font-semibold text-gray-500 uppercase mb-3">Produkter (Tryk for at sælge)</h2>
                            <div className="grid grid-cols-2 gap-3 sm:grid-cols-3">
                                {INITIAL_PRODUCTS.map((product) => (
                                    <button
                                        key={product.id}
                                        onClick={() => handleSale(product)}
                                        className="bg-white p-4 rounded-xl shadow-sm border-2 border-transparent active:border-yellow-400 active:bg-yellow-50 transition-all flex flex-col items-center justify-center touch-manipulation"
                                    >
                                        <Icon name={product.icon} className={getIconColor(product.icon)} size={32} />
                                        <span className="font-semibold text-gray-800 text-center leading-tight">{product.name}</span>
                                        <span className="text-sm text-gray-500 mt-1">{product.price} kr.</span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        <section className="flex gap-2">
                            <button 
                                onClick={undoLastSale}
                                disabled={sales.length === 0 || isSending}
                                className="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg flex items-center justify-center gap-2 font-medium disabled:opacity-50 active:bg-gray-300"
                            >
                                <Icon name="undo-2" size={18} className="mr-1" />
                                Fortryd
                            </button>
                            <button 
                                onClick={sendToGoogleSheet}
                                disabled={sales.length === 0 || isSending}
                                className="flex-[2] bg-green-600 text-white py-3 rounded-lg flex items-center justify-center gap-2 font-medium disabled:opacity-50 active:bg-green-700"
                            >
                                <Icon name="download" size={18} className="mr-1" />
                                {isSending ? 'Sender...' : 'Gennemfør ordre'}
                            </button>
                        </section>

                        <section className="mt-2 pb-8">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-sm font-semibold text-gray-500 uppercase">Valgt</h2>
                                <button 
                                    onClick={clearAllSales}
                                    disabled={sales.length === 0}
                                    className="text-red-500 text-sm flex items-center gap-1 disabled:opacity-50"
                                >
                                    <Icon name="trash-2" size={14} /> Slet Alt
                                </button>
                            </div>
                            
                            <div className="bg-white rounded-xl shadow-sm overflow-hidden">
                                {sales.length === 0 ? (
                                    <div className="p-6 text-center text-gray-400 text-sm">
                                        Ingen salg registreret endnu. Tryk på et produkt ovenfor for at starte.
                                    </div>
                                ) : (
                                    <ul className="divide-y divide-gray-100 max-h-60 overflow-y-auto">
                                        {sales.map((sale, index) => (
                                            <li key={sale.id} className={`p-3 flex justify-between items-center ${index === 0 ? 'bg-yellow-50/50' : ''}`}>
                                                <div>
                                                    <div className="font-medium text-gray-800">{sale.product}</div>
                                                    <div className="text-xs text-gray-400">
                                                        {new Date(sale.timestamp).toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                                    </div>
                                                </div>
                                                <div className="font-semibold text-gray-900">
                                                    {sale.price} kr.
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
